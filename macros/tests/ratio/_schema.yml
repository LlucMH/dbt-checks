version: 2

macros:

  # =========================
  # RATIO
  # =========================

  - name: test_null_ratio_between
    description: "{{ doc('test_null_ratio_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_null_ratio_below
    description: "{{ doc('test_null_ratio_below') }}"
    arguments:
      - name: model
      - name: column_name
      - name: threshold
      - name: group_by
      - name: where

  - name: test_positive_ratio_between
    description: "{{ doc('test_positive_ratio_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_negative_ratio_between
    description: "{{ doc('test_negative_ratio_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_value_ratio_between
    description: "{{ doc('test_value_ratio_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: value
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_distinct_ratio_between
    description: "{{ doc('test_distinct_ratio_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_unique_combination_ratio_between
    description: "{{ doc('test_unique_combination_ratio_between') }}"
    arguments:
      - name: model
      - name: columns
        type: list
        description: >
          Non-empty list of column names or SQL expressions defining the composite
          key. Each item is treated as one key component. Rows where any expression
          evaluates to NULL are excluded from the metric. Duplicate expressions are
          rejected at compile time.
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where

  - name: test_duplicate_ratio_between
    description: "{{ doc('test_duplicate_ratio_between') }}"
    arguments:
      - name: model
      - name: columns
        type: list
        description: >
          Non-empty list of column names or SQL expressions defining the composite
          key. Each item is treated as one key component. Rows where any expression
          evaluates to NULL are excluded from the metric. Duplicate expressions are
          rejected at compile time.
      - name: min_ratio
      - name: max_ratio
      - name: group_by
      - name: where