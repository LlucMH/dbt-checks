version: 2

macros:

  # =========================
  # STRING
  # =========================

  - name: test_contains
    description: "{{ doc('test_contains') }}"
    arguments:
      - name: model
      - name: column_name
      - name: substring
      - name: where

  - name: test_not_blank
    description: "{{ doc('test_not_blank') }}"
    arguments:
      - name: model
      - name: column_name
      - name: where

  - name: test_starts_with
    description: "{{ doc('test_starts_with') }}"
    arguments:
      - name: model
      - name: column_name
      - name: prefix
      - name: where

  - name: test_ends_with
    description: "{{ doc('test_ends_with') }}"
    arguments:
      - name: model
      - name: column_name
      - name: suffix
      - name: where

  - name: test_length_between
    description: "{{ doc('test_length_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_length
      - name: max_length
      - name: where

  - name: test_matches_regex
    description: "{{ doc('test_matches_regex') }}"
    arguments:
      - name: model
      - name: column_name
      - name: pattern
      - name: where