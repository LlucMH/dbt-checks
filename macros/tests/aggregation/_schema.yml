version: 2

macros:

  # =========================
  # AGGREGATION
  # =========================

  - name: test_avg_between
    description: "{{ doc('test_avg_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_sum_between
    description: "{{ doc('test_sum_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_min_between
    description: "{{ doc('test_min_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_max_between
    description: "{{ doc('test_max_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_distinct_count_between
    description: "{{ doc('test_distinct_count_between') }}"
    arguments:
      - name: model
      - name: column_name
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_duplicate_count_between
    description: "{{ doc('test_duplicate_count_between') }}"
    arguments:
      - name: model
      - name: columns
        type: list
        description: >
          Non-empty list of column names or SQL expressions defining the composite
          key. Each item is treated as one key component. Rows where any expression
          evaluates to NULL are excluded from the metric. Duplicate expressions are
          rejected at compile time.
      - name: min_count
      - name: max_count
      - name: group_by
      - name: where

  - name: test_row_count_between
    description: "{{ doc('test_row_count_between') }}"
    arguments:
      - name: model
      - name: min_value
      - name: max_value
      - name: group_by
      - name: where

  - name: test_row_count_greater_than
    description: "{{ doc('test_row_count_greater_than') }}"
    arguments:
      - name: model
      - name: value
      - name: group_by
      - name: where

  - name: test_row_count_less_than
    description: "{{ doc('test_row_count_less_than') }}"
    arguments:
      - name: model
      - name: value
      - name: group_by
      - name: where