dbt_checks:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: duckdb
      path: "test.duckdb"
      threads: 2
    postgres:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | as_number }}"
      user: "{{ env_var('POSTGRES_USER', 'dbt_checks') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'dbt_checks') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'dbt_checks') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA', 'public') }}"
      threads: 2
    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('BIGQUERY_PROJECT', '') }}"
      dataset: "{{ env_var('BIGQUERY_DATASET', 'dbt_checks') }}"
      keyfile: "{{ env_var('BIGQUERY_KEYFILE', '') }}"
      location: "{{ env_var('BIGQUERY_LOCATION', 'US') }}"
      threads: 2
    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', '') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'dbt_checks') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', '') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'public') }}"
      threads: 2
    databricks:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', '') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', '') }}"
      schema: "{{ env_var('DATABRICKS_SCHEMA', 'default') }}"
      threads: 2
    spark:
      type: spark
      method: thrift
      host: "{{ env_var('SPARK_HOST', '') }}"
      port: "{{ env_var('SPARK_PORT', '10000') | as_number }}"
      user: "{{ env_var('SPARK_USER', 'dbt_checks') }}"
      password: "{{ env_var('SPARK_PASSWORD', '') }}"
      auth: "LDAP"
      connect_timeout: 30
      schema: "{{ env_var('SPARK_SCHEMA', 'default') }}"
      threads: 2