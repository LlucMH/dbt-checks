version: 2

models:
  - name: between_values_valid
    columns:
      - name: value
        data_tests:
          - dbt_checks.between_values:
              arguments:
                min_value: 0
                max_value: 100
              config:
                tags: ["should_pass"]

  - name: between_values_invalid
    columns:
      - name: value
        data_tests:
          - dbt_checks.between_values:
              arguments:
                min_value: 0
                max_value: 100
              config:
                tags: ["should_fail"]

  - name: greater_or_equal_than_valid
