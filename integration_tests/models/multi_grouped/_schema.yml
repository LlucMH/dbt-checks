version: 2

models:

  - name: multi_grouped_valid
    columns:
      - name: amount
        data_tests:

          - dbt_checks.avg_between:
              arguments:
                column_name: amount
                min_value: 50
                max_value: 200
                group_by:
                  - country
                  - status
              config:
                tags: ["should_pass"]

          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 1.0
                max_ratio: 1.0
                group_by:
                  - country
                  - status
              config:
                tags: ["should_pass"]

  - name: multi_grouped_invalid
    columns:
      - name: amount
        data_tests:

          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 1.0
                max_ratio: 1.0
                group_by:
                  - country
                  - status
              config:
                tags: ["should_fail"]

  - name: multi_grouped_distinct_valid
    columns:
      - name: session_id
        data_tests:

          - dbt_checks.distinct_ratio_between:
              arguments:
                column_name: session_id
                min_ratio: 0.5
                max_ratio: 1.0
                group_by:
                  - country
                  - channel
              config:
                tags: ["should_pass"]

          - dbt_checks.distinct_count_between:
              arguments:
                column_name: session_id
                min_value: 1
                max_value: 2
                group_by:
                  - country
                  - channel
              config:
                tags: ["should_pass"]

  - name: multi_grouped_distinct_invalid
    columns:
      - name: session_id
        data_tests:

          - dbt_checks.distinct_ratio_between:
              arguments:
                column_name: session_id
                min_ratio: 1.0
                max_ratio: 1.0
                group_by:
                  - country
                  - channel
              config:
                tags: ["should_fail"]

          - dbt_checks.distinct_count_between:
              arguments:
                column_name: session_id
                min_value: 2
                max_value: 2
                group_by:
                  - country
                  - channel
              config:
                tags: ["should_fail"]

  - name: multi_grouped_unique_combination_valid
    data_tests:
      - dbt_checks.unique_combination_ratio_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_ratio: 0.5
            max_ratio: 0.5
            group_by:
              - country
              - channel
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_count_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_count: 2
            max_count: 2
            group_by:
              - country
              - channel
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_ratio_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_ratio: 0.5
            max_ratio: 0.5
            group_by:
              - country
              - channel
          config:
            tags: ["should_pass"]

  - name: multi_grouped_unique_combination_invalid
    data_tests:
      - dbt_checks.unique_combination_ratio_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_ratio: 0.9
            max_ratio: 1.0
            group_by:
              - country
              - channel
          config:
            tags: ["should_fail"]

      - dbt_checks.duplicate_count_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_count: 3
            max_count: 4
            group_by:
              - country
              - channel
          config:
            tags: ["should_fail"]

      - dbt_checks.duplicate_ratio_between:
          arguments:
            columns:
              - order_id
              - line_no
            min_ratio: 0.9
            max_ratio: 1.0
            group_by:
              - country
              - channel
          config:
            tags: ["should_fail"]