version: 2

models:
  - name: empty_numeric
    columns:
      - name: value
        data_tests:
          - dbt_checks.non_negative:
              config:
                tags: ["should_pass"]
          - dbt_checks.non_positive:
              config:
                tags: ["should_pass"]
          - dbt_checks.greater_than:
              arguments:
                value: 0
              config:
                tags: ["should_pass"]
          - dbt_checks.greater_or_equal_than:
              arguments:
                value: 0
              config:
                tags: ["should_pass"]
          - dbt_checks.less_than:
              arguments:
                value: 100
              config:
                tags: ["should_pass"]
          - dbt_checks.less_or_equal_than:
              arguments:
                value: 100
              config:
                tags: ["should_pass"]
          - dbt_checks.between_values:
              arguments:
                min_value: 0
                max_value: 100
              config:
                tags: ["should_pass"]

  - name: empty_string
    columns:
      - name: value
        data_tests:
          - dbt_checks.not_blank:
              config:
                tags: ["should_pass"]
          - dbt_checks.length_between:
              arguments:
                min_length: 1
                max_length: 20
              config:
                tags: ["should_pass"]
          - dbt_checks.matches_regex:
              arguments:
                pattern: "^[a-z]+$"
              config:
                tags: ["should_pass"]
          - dbt_checks.starts_with:
              arguments:
                prefix: "a"
              config:
                tags: ["should_pass"]
          - dbt_checks.ends_with:
              arguments:
                suffix: "z"
              config:
                tags: ["should_pass"]
          - dbt_checks.contains:
              arguments:
                substring: "a"
              config:
                tags: ["should_pass"]

  - name: empty_temporal
    columns:
      - name: date
        data_tests:
          - dbt_checks.not_future_date:
              config:
                tags: ["should_pass"]
          - dbt_checks.not_before_date:
              arguments:
                min_date: "2024-01-01"
              config:
                tags: ["should_pass"]
          - dbt_checks.between_dates:
              arguments:
                min_date: "2024-01-01"
                max_date: "2024-12-31"
              config:
                tags: ["should_pass"]
          - dbt_checks.recent_date:
              arguments:
                max_age_days: 10000
              config:
                tags: ["should_pass"]
          - dbt_checks.no_weekend_dates:
              config:
                tags: ["should_pass"]

    data_tests:
      - dbt_checks.date_diff_less_than:
          arguments:
            start_column: start_date
            end_column: end_date
            max_days: 10
          config:
            tags: ["should_pass"]

  - name: empty_aggregation
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 0
          config:
            tags: ["should_fail"]
      - dbt_checks.row_count_less_than:
          arguments:
            value: 1
          config:
            tags: ["should_pass"]
      - dbt_checks.row_count_between:
          arguments:
            min_value: 0
            max_value: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: value
            min_value: 0
            max_value: 100
          config:
            tags: ["should_fail"]
      - dbt_checks.avg_between:
          arguments:
            column_name: value
            min_value: 0
            max_value: 100
          config:
            tags: ["should_fail"]
      - dbt_checks.min_between:
          arguments:
            column_name: value
            min_value: 0
            max_value: 100
          config:
            tags: ["should_fail"]
      - dbt_checks.max_between:
          arguments:
            column_name: value
            min_value: 0
            max_value: 100
          config:
            tags: ["should_fail"]

      - dbt_checks.distinct_count_between:
          arguments:
            column_name: value
            min_value: 0
            max_value: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_count_between:
          arguments:
            columns:
              - value
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_group_count_between:
          arguments:
            columns:
              - value
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.max_duplicate_group_size_between:
          arguments:
            columns:
              - value
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

  - name: empty_ratio
    columns:
      - name: value
        data_tests:
          - dbt_checks.null_ratio_below:
              arguments:
                threshold: 0.0
              config:
                tags: ["should_pass"]
          - dbt_checks.null_ratio_between:
              arguments:
                min_ratio: 0.0
                max_ratio: 0.0
              config:
                tags: ["should_pass"]
          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 0.0
                max_ratio: 0.0
              config:
                tags: ["should_pass"]
          - dbt_checks.negative_ratio_between:
              arguments:
                min_ratio: 0.0
                max_ratio: 0.0
              config:
                tags: ["should_pass"]
          - dbt_checks.distinct_ratio_between:
              arguments:
                column_name: value
                min_ratio: 0.0
                max_ratio: 0.0
              config:
                tags: ["should_pass"]

      - name: status
        data_tests:
          - dbt_checks.value_ratio_between:
              arguments:
                value: "active"
                min_ratio: 0.0
                max_ratio: 0.0
              config:
                tags: ["should_pass"]

    data_tests:
      - dbt_checks.unique_combination_ratio_between:
          arguments:
            columns:
              - value
              - status
            min_ratio: 0.0
            max_ratio: 0.0
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_count_between:
          arguments:
            columns:
              - value
              - status
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_group_count_between:
          arguments:
            columns:
              - value
              - status
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.max_duplicate_group_size_between:
          arguments:
            columns:
              - value
              - status
            min_count: 0
            max_count: 0
          config:
            tags: ["should_pass"]

      - dbt_checks.duplicate_ratio_between:
          arguments:
            columns:
              - value
              - status
            min_ratio: 0.0
            max_ratio: 0.0
          config:
            tags: ["should_pass"]