            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]