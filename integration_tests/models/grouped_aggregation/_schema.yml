version: 2

models:
  - name: grouped_row_count_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_where_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_pass"]

  - name: grouped_row_count_null_group_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 0
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_fail"]

  - name: grouped_row_count_where_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_fail"]

  - name: grouped_aggregation_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 30
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.row_count_between:
          arguments:
            min_value: 2
            max_value: 2
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.row_count_less_than:
          arguments:
            value: 3
            group_by: category
          config:
            tags: ["should_pass"]

  - name: grouped_aggregation_where_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

      - dbt_checks.row_count_between:
          arguments:
            min_value: 2
            max_value: 2
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

  - name: grouped_aggregation_null_values_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 30
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

  - name: grouped_aggregation_invalid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.row_count_between:
          arguments:
