version: 2

models:
  - name: grouped_row_count_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_where_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_pass"]

  - name: grouped_row_count_null_group_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 0
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_fail"]

  - name: grouped_row_count_where_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_fail"]