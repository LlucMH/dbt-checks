version: 2

models:
  - name: grouped_row_count_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_where_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_pass"]

  - name: grouped_row_count_null_group_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 0
            group_by: status
          config:
            tags: ["should_pass"]

  - name: grouped_row_count_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            tags: ["should_fail"]

  - name: grouped_row_count_where_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 1
            group_by: status
          config:
            where: "is_active = true"
            tags: ["should_fail"]

  - name: grouped_aggregation_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 30
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.row_count_between:
          arguments:
            min_value: 2
            max_value: 2
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.row_count_less_than:
          arguments:
            value: 3
            group_by: category
          config:
            tags: ["should_pass"]

  - name: grouped_aggregation_where_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

      - dbt_checks.row_count_between:
          arguments:
            min_value: 2
            max_value: 2
            group_by: category
          config:
            where: "is_active = true"
            tags: ["should_pass"]

  - name: grouped_aggregation_null_values_valid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 70
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 30
            group_by: category
          config:
            tags: ["should_pass"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 40
            group_by: category
          config:
            tags: ["should_pass"]

  - name: grouped_aggregation_invalid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.min_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.max_between:
          arguments:
            column_name: amount
            min_value: 20
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.row_count_between:
          arguments:
            min_value: 3
            max_value: 5
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.row_count_less_than:
          arguments:
            value: 2
            group_by: category
          config:
            tags: ["should_fail"]

  - name: grouped_aggregation_null_group_invalid
    data_tests:
      - dbt_checks.avg_between:
          arguments:
            column_name: amount
            min_value: 10
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

      - dbt_checks.sum_between:
          arguments:
            column_name: amount
            min_value: 30
            max_value: 100
            group_by: category
          config:
            tags: ["should_fail"]

  - name: grouped_ratio_valid
    columns:
      - name: status
        data_tests:
          - dbt_checks.null_ratio_below:
              arguments:
                threshold: 0.30
                group_by: country
              config:
                tags: ["should_pass"]

          - dbt_checks.null_ratio_between:
              arguments:
                min_ratio: 0.20
                max_ratio: 0.30
                group_by: country
              config:
                tags: ["should_pass"]

          - dbt_checks.value_ratio_between:
              arguments:
                value: "completed"
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_pass"]

          - dbt_checks.value_ratio_between:
              arguments:
                value: "completed"
                min_ratio: 0.0
                max_ratio: 1.0
                group_by:
                  - country
                  - status
              config:
                tags: ["should_pass"]

      - name: amount
        data_tests:
          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_pass"]

          - dbt_checks.negative_ratio_between:
              arguments:
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_pass"]

  - name: grouped_ratio_where_valid
    columns:
      - name: status
        data_tests:
          - dbt_checks.null_ratio_below:
              arguments:
                threshold: 0.01
                group_by: country
              config:
                where: "is_active = true"
                tags: ["should_pass"]

          - dbt_checks.value_ratio_between:
              arguments:
                value: "completed"
                min_ratio: 0.60
                max_ratio: 0.70
                group_by: country
              config:
                where: "is_active = true"
                tags: ["should_pass"]

      - name: amount
        data_tests:
          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 0.60
                max_ratio: 0.70
                group_by: country
              config:
                where: "is_active = true"
                tags: ["should_pass"]

  - name: grouped_ratio_null_group_valid
    columns:
      - name: status
        data_tests:
          - dbt_checks.value_ratio_between:
              arguments:
                value: "completed"
                min_ratio: 0.50
                max_ratio: 0.50
                group_by: country
              config:
                tags: ["should_pass"]

      - name: amount
        data_tests:
          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 0.50
                max_ratio: 0.50
                group_by: country
              config:
                tags: ["should_pass"]

          - dbt_checks.negative_ratio_between:
              arguments:
                min_ratio: 0.50
                max_ratio: 0.50
                group_by: country
              config:
                tags: ["should_pass"]

  - name: grouped_ratio_invalid
    columns:
      - name: status
        data_tests:
          - dbt_checks.null_ratio_below:
              arguments:
                threshold: 0.30
                group_by: country
              config:
                tags: ["should_fail"]

          - dbt_checks.null_ratio_between:
              arguments:
                min_ratio: 0.20
                max_ratio: 0.30
                group_by: country
              config:
                tags: ["should_fail"]

          - dbt_checks.value_ratio_between:
              arguments:
                value: "completed"
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_fail"]

      - name: amount
        data_tests:
          - dbt_checks.positive_ratio_between:
              arguments:
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_fail"]

          - dbt_checks.negative_ratio_between:
              arguments:
                min_ratio: 0.40
                max_ratio: 0.60
                group_by: country
              config:
                tags: ["should_fail"]