version: 2

models:

  - name: not_future_date_valid
    columns:
      - name: date
        data_tests:
          - dbt_checks.not_future_date:
              config:
                tags: ["should_pass"]

  - name: not_future_date_invalid
    columns:
      - name: date
        data_tests:
          - dbt_checks.not_future_date:
              config:
                tags: ["should_fail"]

  - name: not_before_date_valid
    columns:
      - name: date
        data_tests:
          - dbt_checks.not_before_date:
              arguments:
                min_date: "2024-01-01"
              config:
                tags: ["should_pass"]

  - name: not_before_date_invalid
    columns:
      - name: date
        data_tests:
          - dbt_checks.not_before_date:
              arguments:
                min_date: "2024-01-01"
              config:
                tags: ["should_fail"]

  - name: between_dates_valid
    columns:
      - name: date
        data_tests:
          - dbt_checks.between_dates:
              arguments:
                min_date: "2024-01-01"
                max_date: "2024-12-31"
              config:
                tags: ["should_pass"]

  - name: between_dates_invalid
    columns:
      - name: date
        data_tests:
          - dbt_checks.between_dates:
              arguments:
                min_date: "2024-01-01"
                max_date: "2024-12-31"
              config:
                tags: ["should_fail"]

  - name: recent_date_valid
    columns:
      - name: date
        data_tests:
          - dbt_checks.recent_date:
              arguments:
                max_age_days: 30
              config:
                tags: ["should_pass"]

  - name: recent_date_invalid
    columns:
      - name: date
        data_tests:
          - dbt_checks.recent_date:
              arguments:
                max_age_days: 30
              config:
                tags: ["should_fail"]

  - name: date_diff_less_than_valid
    data_tests:
      - dbt_checks.date_diff_less_than:
          arguments:
            start_column: start_date
            end_column: end_date
            max_days: 10
          config:
            tags: ["should_pass"]

  - name: date_diff_less_than_valid
    data_tests:
      - dbt_checks.date_diff_less_than:
          arguments:
            start_column: start_date
            end_column: end_date
            max_days: 10
          config:
            tags: ["should_fail"]

  - name: no_weekend_dates_valid
    columns:
      - name: date
        data_tests:
          - dbt_checks.no_weekend_dates:
              config:
                tags: ["should_pass"]

  - name: no_weekend_dates_invalid
    columns:
      - name: date
        data_tests:
          - dbt_checks.no_weekend_dates:
              config:
                tags: ["should_fail"]