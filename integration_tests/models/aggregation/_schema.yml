version: 2

models:

  - name: row_count_greater_than_valid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 3
          config:
            tags: ["should_pass"]

  - name: row_count_greater_than_invalid
    data_tests:
      - dbt_checks.row_count_greater_than:
          arguments:
            value: 10
          config:
            tags: ["should_fail"]

  - name: row_count_less_than_valid
