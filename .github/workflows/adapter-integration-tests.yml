name: Adapter Integration Tests

on:
  workflow_call:
    inputs:
      adapter:
        description: Adapter to validate
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        required: false
      SNOWFLAKE_PASSWORD:
        required: false
      DATABRICKS_TOKEN:
        required: false

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbt_checks
          POSTGRES_PASSWORD: dbt_checks
          POSTGRES_DB: dbt_checks
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      DBT_PACKAGES_INSTALL_PATH: /tmp/dbt-checks-packages
      DBT_TARGET: ${{ inputs.adapter == 'postgres' && 'postgres' || (inputs.adapter == 'bigquery' && 'bigquery' || (inputs.adapter == 'snowflake' && 'snowflake' || (inputs.adapter == 'databricks' && 'databricks' || 'dev'))) }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: dbt_checks
      POSTGRES_PASSWORD: dbt_checks
      POSTGRES_DB: dbt_checks
      POSTGRES_SCHEMA: public
      BIGQUERY_PROJECT: ${{ vars.BIGQUERY_PROJECT }}
      BIGQUERY_DATASET: ${{ vars.BIGQUERY_DATASET || 'dbt_checks' }}
      BIGQUERY_LOCATION: ${{ vars.BIGQUERY_LOCATION || 'US' }}
      BIGQUERY_KEYFILE: ${{ github.workspace }}/bq-key.json
      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE || 'dbt_checks' }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA || 'public' }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ vars.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CATALOG: ${{ vars.DATABRICKS_CATALOG }}
      DATABRICKS_SCHEMA: ${{ vars.DATABRICKS_SCHEMA || 'default' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (duckdb)
        if: inputs.adapter == 'duckdb'
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-duckdb==1.10.1 duckdb

      - name: Install dbt (postgres)
        if: inputs.adapter == 'postgres'
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-postgres==1.10.2 psycopg2-binary

      - name: Install dbt (bigquery)
        if: inputs.adapter == 'bigquery'
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-bigquery==1.11.3 google-cloud-bigquery

      - name: Install dbt (snowflake)
        if: inputs.adapter == 'snowflake'
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-snowflake==1.11.1 snowflake-connector-python

      - name: Install dbt (databricks)
        if: inputs.adapter == 'databricks'
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-databricks==1.11.2 databricks-sql-connector

      - name: Write BigQuery service account keyfile
        if: inputs.adapter == 'bigquery'
        run: echo "$GCP_SA_KEY" > "$BIGQUERY_KEYFILE"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Install package dependencies
        working-directory: integration_tests
        run: dbt deps

      - name: Check dbt parsing
        working-directory: integration_tests
        run: dbt parse

      - name: Prepare invalid config project macros
        run: |
          rm -rf integration_tests_invalid_configs/macros
          cp -R macros integration_tests_invalid_configs/macros

      - name: Validate invalid configurations fail due to validation guards
        working-directory: integration_tests_invalid_configs
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests_invalid_configs
        run: |
          set +e
          dbt compile 2>&1 | tee invalid_config_output.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected invalid configuration project to fail compilation, but it passed."
            exit 1
          fi

          if grep -q "dbt_checks' is undefined" invalid_config_output.log; then
            echo "Invalid configuration project failed because dbt_checks was not installed."
            exit 1
          fi

          if grep -q "macro that does not exist" invalid_config_output.log; then
            echo "Invalid configuration project failed because a macro could not be found."
            exit 1
          fi

          if ! grep -q "Invalid argument\|Invalid arguments" invalid_config_output.log; then
            echo "Invalid configuration project failed, but not because of validation guards."
            exit 1
          fi

          echo "Invalid configuration project failed due to validation guards as expected."

      - name: Assert test selection is not empty
        working-directory: integration_tests
        run: |
          dbt ls --select tag:should_pass --resource-type test | grep .
          dbt ls --select tag:should_fail --resource-type test | grep .

      - name: Seed test data
        working-directory: integration_tests
        run: dbt seed --full-refresh

      - name: Run test models
        working-directory: integration_tests
        run: dbt run

      - name: Run severity warn tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn

      - name: Assert severity error tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error && exit 1 || exit 0

      - name: Run warn_if tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn_if

      - name: Assert error_if tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error_if && exit 1 || exit 0

      - name: Run passing tests
        working-directory: integration_tests
        run: dbt test --select tag:should_pass --warn-error

      - name: Assert passing tests passed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          failed = [
              r["unique_id"]
              for r in results
              if r.get("status") != "pass"
          ]

          if failed:
              print("Some tests tagged should_pass did not pass:")
              for test in failed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_pass passed successfully.")
          PY

      - name: Run failing tests and store failure rows
        working-directory: integration_tests
        run: |
          dbt test --select tag:should_fail --store-failures || true

      - name: Assert expected failing tests failed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          passed = [
              r["unique_id"]
              for r in results
              if r.get("status") == "pass"
          ]

          if passed:
              print("Some tests tagged should_fail unexpectedly passed:")
              for test in passed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_fail failed as expected.")
          PY

      - name: Print enriched failure outputs (duckdb)
        if: always() && inputs.adapter == 'duckdb'
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import glob
          import os
          import duckdb

          db_files = glob.glob("**/*.duckdb", recursive=True)

          if not db_files:
              print("No DuckDB database found.")
              raise SystemExit(0)

          db_path = max(db_files, key=os.path.getmtime)
          print(f"Using DuckDB database: {db_path}")

          con = duckdb.connect(db_path, read_only=True)

          tables = con.execute("""
              select table_schema, table_name
              from information_schema.tables
              where table_schema ilike '%dbt_test__audit%'
              order by table_name
          """).fetchall()

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for schema, table in tables:
              query = f'select * from "{schema}"."{table}" limit 20'
              result = con.execute(query)

              headers = [col[0] for col in result.description]
              rows = result.fetchall()

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Print enriched failure outputs (postgres)
        if: always() && inputs.adapter == 'postgres'
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import os
          import psycopg2

          con = psycopg2.connect(
              host=os.environ["POSTGRES_HOST"],
              port=os.environ["POSTGRES_PORT"],
              user=os.environ["POSTGRES_USER"],
              password=os.environ["POSTGRES_PASSWORD"],
              dbname=os.environ["POSTGRES_DB"],
          )
          con.autocommit = True
          cur = con.cursor()

          cur.execute("""
              select table_schema, table_name
              from information_schema.tables
              where table_schema ilike '%dbt_test__audit%'
              order by table_name
          """)
          tables = cur.fetchall()

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for schema, table in tables:
              cur.execute(f'select * from "{schema}"."{table}" limit 20')

              headers = [col.name for col in cur.description]
              rows = cur.fetchall()

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Print enriched failure outputs (bigquery)
        if: always() && inputs.adapter == 'bigquery'
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import os
          from google.cloud import bigquery

          client = bigquery.Client.from_service_account_json(
              os.environ["BIGQUERY_KEYFILE"],
              project=os.environ["BIGQUERY_PROJECT"],
          )

          tables = list(client.query(f"""
              select table_name
              from `{os.environ['BIGQUERY_PROJECT']}.{os.environ['BIGQUERY_DATASET']}`.INFORMATION_SCHEMA.TABLES
              where table_name like '%dbt_test__audit%'
              order by table_name
          """).result())

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for row in tables:
              table = row["table_name"]
              result = client.query(
                  f"select * from `{os.environ['BIGQUERY_PROJECT']}.{os.environ['BIGQUERY_DATASET']}.{table}` limit 20"
              ).result()

              headers = [field.name for field in result.schema]
              rows = [[value for value in record.values()] for record in result]

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Print enriched failure outputs (snowflake)
        if: always() && inputs.adapter == 'snowflake'
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import os
          import snowflake.connector

          con = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role=os.environ.get("SNOWFLAKE_ROLE") or None,
              database=os.environ["SNOWFLAKE_DATABASE"],
              warehouse=os.environ.get("SNOWFLAKE_WAREHOUSE") or None,
              schema=os.environ["SNOWFLAKE_SCHEMA"],
          )
          cur = con.cursor()

          cur.execute(f"""
              select table_schema, table_name
              from {os.environ['SNOWFLAKE_DATABASE']}.information_schema.tables
              where table_schema ilike '%dbt_test__audit%'
              order by table_name
          """)
          tables = cur.fetchall()

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for schema, table in tables:
              cur.execute(f'select * from "{schema}"."{table}" limit 20')

              headers = [col[0] for col in cur.description]
              rows = cur.fetchall()

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Print enriched failure outputs (databricks)
        if: always() && inputs.adapter == 'databricks'
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import os
          from databricks import sql

          con = sql.connect(
              server_hostname=os.environ["DATABRICKS_HOST"],
              http_path=os.environ["DATABRICKS_HTTP_PATH"],
              access_token=os.environ["DATABRICKS_TOKEN"],
              catalog=os.environ.get("DATABRICKS_CATALOG") or None,
              schema=os.environ["DATABRICKS_SCHEMA"],
          )
          cur = con.cursor()

          cur.execute("""
              select table_schema, table_name
              from information_schema.tables
              where table_schema ilike '%dbt_test__audit%'
              order by table_name
          """)
          tables = cur.fetchall()

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for schema, table in tables:
              cur.execute(f"select * from `{schema}`.`{table}` limit 20")

              headers = [col[0] for col in cur.description]
              rows = cur.fetchall()

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Check dbt compilation
        working-directory: integration_tests
        run: dbt compile

      - name: Check documentation generation
        working-directory: integration_tests
        run: dbt docs generate

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ inputs.adapter }}
          path: |
            integration_tests/target
            integration_tests/logs
            integration_tests_invalid_configs/target
            integration_tests_invalid_configs/invalid_config_output.log
