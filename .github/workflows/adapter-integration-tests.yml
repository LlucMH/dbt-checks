name: Adapter Integration Tests

on:
  workflow_call:
    inputs:
      adapter:
        description: Adapter to validate
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        required: false
      SNOWFLAKE_PASSWORD:
        required: false
      DATABRICKS_TOKEN:
        required: false
      SPARK_PASSWORD:
        required: false
      REDSHIFT_PASSWORD:
        required: false

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbt_checks
          POSTGRES_PASSWORD: dbt_checks
          POSTGRES_DB: dbt_checks
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      DBT_PACKAGES_INSTALL_PATH: /tmp/dbt-checks-packages
      DBT_TARGET: ${{ inputs.adapter == 'postgres' && 'postgres' || (inputs.adapter == 'bigquery' && 'bigquery' || (inputs.adapter == 'snowflake' && 'snowflake' || (inputs.adapter == 'databricks' && 'databricks' || (inputs.adapter == 'spark' && 'spark' || (inputs.adapter == 'redshift' && 'redshift' || 'dev'))))) }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: dbt_checks
      POSTGRES_PASSWORD: dbt_checks
      POSTGRES_DB: dbt_checks
      POSTGRES_SCHEMA: public
      BIGQUERY_PROJECT: ${{ vars.BIGQUERY_PROJECT }}
      BIGQUERY_DATASET: ${{ vars.BIGQUERY_DATASET || 'dbt_checks' }}
      BIGQUERY_LOCATION: ${{ vars.BIGQUERY_LOCATION || 'US' }}
      BIGQUERY_KEYFILE: ${{ github.workspace }}/bq-key.json
      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE || 'dbt_checks' }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA || 'public' }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ vars.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CATALOG: ${{ vars.DATABRICKS_CATALOG }}
      DATABRICKS_SCHEMA: ${{ vars.DATABRICKS_SCHEMA || 'default' }}
      SPARK_HOST: ${{ vars.SPARK_HOST }}
      SPARK_PORT: ${{ vars.SPARK_PORT || '10000' }}
      SPARK_USER: ${{ vars.SPARK_USER || 'dbt_checks' }}
      SPARK_PASSWORD: ${{ secrets.SPARK_PASSWORD }}
      SPARK_SCHEMA: ${{ vars.SPARK_SCHEMA || 'default' }}
      REDSHIFT_HOST: ${{ vars.REDSHIFT_HOST }}
      REDSHIFT_PORT: ${{ vars.REDSHIFT_PORT || '5439' }}
      REDSHIFT_USER: ${{ vars.REDSHIFT_USER || 'dbt_checks' }}
      REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}
      REDSHIFT_DB: ${{ vars.REDSHIFT_DB || 'dbt_checks' }}
      REDSHIFT_SCHEMA: ${{ vars.REDSHIFT_SCHEMA || 'public' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip

          # Centralized adapter -> package mapping. Every leg pins the same
          # dbt-core version; only the adapter package (and its extras)
          # differs.
          case "${{ inputs.adapter }}" in
            duckdb)
              pip install dbt-core==1.11.7 dbt-duckdb==1.10.1 duckdb
              ;;
            postgres)
              pip install dbt-core==1.11.7 dbt-postgres==1.10.2 psycopg2-binary
              ;;
            bigquery)
              pip install dbt-core==1.11.7 dbt-bigquery==1.11.3 google-cloud-bigquery
              ;;
            snowflake)
              pip install dbt-core==1.11.7 dbt-snowflake==1.11.1 snowflake-connector-python
              ;;
            databricks)
              pip install dbt-core==1.11.7 dbt-databricks==1.11.2 databricks-sql-connector
              ;;
            spark)
              pip install dbt-core==1.11.7 "dbt-spark[PyHive]==1.9.3"
              ;;
            redshift)
              pip install dbt-core==1.11.7 dbt-redshift==1.11.1 psycopg2-binary
              ;;
            *)
              echo "Unknown adapter: ${{ inputs.adapter }}" >&2
              exit 1
              ;;
          esac

      - name: Write BigQuery service account keyfile
        if: inputs.adapter == 'bigquery'
        run: echo "$GCP_SA_KEY" > "$BIGQUERY_KEYFILE"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Install package dependencies
        working-directory: integration_tests
        run: dbt deps

      - name: Check dbt parsing
        working-directory: integration_tests
        run: dbt parse

      - name: Prepare invalid config project macros
        run: |
          rm -rf integration_tests_invalid_configs/macros
          cp -R macros integration_tests_invalid_configs/macros

      - name: Validate invalid configurations fail due to validation guards
        working-directory: integration_tests_invalid_configs
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests_invalid_configs
        run: |
          set +e
          dbt compile 2>&1 | tee invalid_config_output.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected invalid configuration project to fail compilation, but it passed."
            exit 1
          fi

          if grep -q "dbt_checks' is undefined" invalid_config_output.log; then
            echo "Invalid configuration project failed because dbt_checks was not installed."
            exit 1
          fi

          if grep -q "macro that does not exist" invalid_config_output.log; then
            echo "Invalid configuration project failed because a macro could not be found."
            exit 1
          fi

          if ! grep -q "Invalid argument\|Invalid arguments" invalid_config_output.log; then
            echo "Invalid configuration project failed, but not because of validation guards."
            exit 1
          fi

          echo "Invalid configuration project failed due to validation guards as expected."

      - name: Assert test selection is not empty
        working-directory: integration_tests
        run: |
          dbt ls --select tag:should_pass --resource-type test | grep .
          dbt ls --select tag:should_fail --resource-type test | grep .

      - name: Seed test data
        working-directory: integration_tests
        run: dbt seed --full-refresh

      - name: Run test models
        working-directory: integration_tests
        run: dbt run --exclude tag:performance_smoke

      - name: Run severity warn tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn

      - name: Assert severity error tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error && exit 1 || exit 0

      - name: Run warn_if tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn_if

      - name: Assert error_if tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error_if && exit 1 || exit 0

      - name: Run passing tests
        working-directory: integration_tests
        run: dbt test --select tag:should_pass --warn-error

      - name: Assert passing tests passed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          failed = [
              r["unique_id"]
              for r in results
              if r.get("status") != "pass"
          ]

          if failed:
              print("Some tests tagged should_pass did not pass:")
              for test in failed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_pass passed successfully.")
          PY

      - name: Run failing tests and store failure rows
        working-directory: integration_tests
        run: |
          dbt test --select tag:should_fail --store-failures || true

      - name: Assert expected failing tests failed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          passed = [
              r["unique_id"]
              for r in results
              if r.get("status") == "pass"
          ]

          if passed:
              print("Some tests tagged should_fail unexpectedly passed:")
              for test in passed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_fail failed as expected.")
          PY

      - name: Print enriched failure outputs
        if: always()
        working-directory: integration_tests
        run: python "$GITHUB_WORKSPACE/.github/scripts/print_stored_failures.py" --adapter "${{ inputs.adapter }}"

      - name: Check dbt compilation
        working-directory: integration_tests
        run: dbt compile

      - name: Check documentation generation
        working-directory: integration_tests
        run: dbt docs generate

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ inputs.adapter }}
          path: |
            integration_tests/target
            integration_tests/logs
            integration_tests_invalid_configs/target
            integration_tests_invalid_configs/invalid_config_output.log
