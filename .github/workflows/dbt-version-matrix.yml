name: dbt Core Version Matrix

on:
  workflow_call:
    inputs:
      dbt_core_version:
        description: dbt-core version to install
        required: true
        type: string
      dbt_duckdb_version:
        description: dbt-duckdb version to install
        required: true
        type: string

jobs:
  version-matrix:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests_dbt_version_matrix
      DBT_PACKAGES_INSTALL_PATH: /tmp/dbt-checks-version-matrix-packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==${{ inputs.dbt_core_version }}" "dbt-duckdb==${{ inputs.dbt_duckdb_version }}" duckdb

      - name: Install package dependencies
        working-directory: integration_tests_dbt_version_matrix
        run: dbt deps

      - name: Check dbt parsing
        working-directory: integration_tests_dbt_version_matrix
        run: dbt parse

      - name: Run smoke model
        working-directory: integration_tests_dbt_version_matrix
        run: dbt run

      - name: Run passing check
        working-directory: integration_tests_dbt_version_matrix
        run: dbt --warn-error test --select tag:should_pass

      - name: Assert failing check fails
        working-directory: integration_tests_dbt_version_matrix
        run: |
          dbt test --select tag:should_fail && exit 1 || exit 0

      - name: Check dbt compilation
        working-directory: integration_tests_dbt_version_matrix
        run: dbt compile

      - name: Check documentation generation
        working-directory: integration_tests_dbt_version_matrix
        run: dbt docs generate
