name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests
      DBT_PACKAGES_INSTALL_PATH: /tmp/dbt-checks-packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.7 dbt-duckdb==1.10.1 duckdb

      - name: Install package dependencies
        working-directory: integration_tests
        run: dbt deps

      - name: Check dbt parsing
        working-directory: integration_tests
        run: dbt parse

      - name: Prepare invalid config project macros
        run: |
          rm -rf integration_tests_invalid_configs/macros
          cp -R macros integration_tests_invalid_configs/macros

      - name: Validate invalid configurations fail due to validation guards
        working-directory: integration_tests_invalid_configs
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests_invalid_configs
        run: |
          set +e
          dbt compile 2>&1 | tee invalid_config_output.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected invalid configuration project to fail compilation, but it passed."
            exit 1
          fi

          if grep -q "dbt_checks' is undefined" invalid_config_output.log; then
            echo "Invalid configuration project failed because dbt_checks was not installed."
            exit 1
          fi

          if grep -q "macro that does not exist" invalid_config_output.log; then
            echo "Invalid configuration project failed because a macro could not be found."
            exit 1
          fi

          if ! grep -q "Invalid argument\|Invalid arguments" invalid_config_output.log; then
            echo "Invalid configuration project failed, but not because of validation guards."
            exit 1
          fi

          echo "Invalid configuration project failed due to validation guards as expected."

      - name: Assert test selection is not empty
        working-directory: integration_tests
        run: |
          dbt ls --select tag:should_pass --resource-type test | grep .
          dbt ls --select tag:should_fail --resource-type test | grep .

      - name: Check OSS governance files
        run: |
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f SUPPORT.md
          grep -i "contributing" CONTRIBUTING.md
          grep -i "code of conduct" CODE_OF_CONDUCT.md
          grep -i "security" SECURITY.md
          grep -i "support" SUPPORT.md

      - name: Check README community links
        run: |
          grep -i "Community & Support" README.md
          grep -i "CONTRIBUTING.md" README.md
          grep -i "CODE_OF_CONDUCT.md" README.md
          grep -i "SECURITY.md" README.md
          grep -i "SUPPORT.md" README.md

      - name: Check no select star in test macros
        run: |
          ! grep -R -i "select \*" macros/tests

      - name: Check standardized failure output columns
        run: |
          grep -R "failed_check" macros/tests
          grep -R "failure_reason" macros/tests
          grep -R "applied_condition" macros/tests

      - name: Check validation guards usage
        run: |
          grep -R "validate_" macros/tests

      - name: Check internal helper macros exist
        run: |
          grep -R '{% macro as_numeric' macros
          grep -R '{% macro as_string' macros
          grep -R '{% macro as_date' macros
          grep -R '{% macro safe_ratio' macros
          grep -R '{% macro apply_where' macros
          grep -R '{% macro apply_and_where' macros
          grep -R '{% macro applied_condition' macros
          grep -R '{% macro safe_sql_string_literal' macros

      - name: Check README documents core UX features
        run: |
          grep -i "where" README.md
          grep -i "NULL Handling" README.md
          grep -i "Severity Configuration" README.md
          grep -i "Standardized Failure Output" README.md
          grep -i "Real-world Usage Patterns" README.md
          grep -i "Validation Guards" README.md
          grep -i "Production Adoption Recommendations" README.md
          grep -i "OSS Maturity" README.md

      - name: Check README installation version exists
        run: |
          grep -E "revision: v[0-9]+\.[0-9]+\.[0-9]+" README.md

      - name: Validate grouped validation documentation
        run: |
          grep -i "group_by" README.md
          grep -i "Grouped" README.md
          grep -i "Grouped Aggregation Checks" README.md
          grep -i "grouped_by_status" README.md
          grep -i "Grouped Ratio Checks" README.md
          grep -i "multi-column grouping" README.md
          grep -i "grouped_by_country" README.md
          grep -i "Grouped Freshness Checks" README.md
          grep -i "recent_date" README.md

      - name: Validate grouped validation helpers
        run: |
          grep "normalize_group_by" macros/helpers/grouping.sql
          grep "render_group_by_select" macros/helpers/grouping.sql
          grep "render_group_by_clause" macros/helpers/grouping.sql
          grep "render_group_by_output" macros/helpers/grouping.sql
          grep "validate_group_by" macros/helpers/validation.sql
          grep "group_by_alias" macros/helpers/grouping.sql
          grep "build_aggregation_validation_cte" macros/helpers/aggregation.sql
          grep "render_aggregation_metric" macros/helpers/aggregation.sql

      - name: Validate multi-column checks
        run: |
          grep -i "Multi-column" README.md
          grep -R "column_greater_than_column" macros/tests/multi_column
          grep -R "column_less_than_column" macros/tests/multi_column
          grep -R "columns_equal" macros/tests/multi_column
          grep -R "columns_distinct" macros/tests/multi_column
          grep -R "left_column" macros/tests/multi_column
          grep -R "right_column" macros/tests/multi_column
          grep -R "validate_required_column" macros/helpers/validation.sql
          grep -i "Rule Composition" README.md
          grep -R "expression_is_true" macros/tests/rule_composition
          grep -R "all_of" macros/tests/rule_composition
          grep -R "any_of" macros/tests/rule_composition
          grep -R "validate_expression_list" macros/helpers/validation.sql
          grep -R "failed_expression" macros/tests/rule_composition

      - name: Validate conditional checks
        run: |
          grep -i "Conditional Checks" README.md
          grep -R "require_when" macros/tests/conditional
          grep -R "require_not_null_when" macros/tests/conditional
          grep -R "require_value_when" macros/tests/conditional
          grep -R "trigger_condition" macros/tests/conditional
          grep -R "required_condition" macros/tests/conditional
          grep -R "required_column" macros/tests/conditional
          grep -R "required_value" macros/tests/conditional

      - name: Seed test data
        working-directory: integration_tests
        run: dbt seed

      - name: Run test models
        working-directory: integration_tests
        run: dbt run

      - name: Run severity warn tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn

      - name: Assert severity error tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error && exit 1 || exit 0

      - name: Run warn_if tests
        working-directory: integration_tests
        run: dbt test --select tag:severity_warn_if

      - name: Assert error_if tests fail
        working-directory: integration_tests
        run: |
          dbt test --select tag:severity_error_if && exit 1 || exit 0

      - name: Run passing tests
        working-directory: integration_tests
        run: dbt test --select tag:should_pass --warn-error

      - name: Assert passing tests passed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          failed = [
              r["unique_id"]
              for r in results
              if r.get("status") != "pass"
          ]

          if failed:
              print("Some tests tagged should_pass did not pass:")
              for test in failed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_pass passed successfully.")
          PY

      - name: Run failing tests and store failure rows
        working-directory: integration_tests
        run: |
          dbt test --select tag:should_fail --store-failures || true

      - name: Assert expected failing tests failed
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import json
          import sys

          with open("target/run_results.json") as f:
              results = json.load(f)["results"]

          passed = [
              r["unique_id"]
              for r in results
              if r.get("status") == "pass"
          ]

          if passed:
              print("Some tests tagged should_fail unexpectedly passed:")
              for test in passed:
                  print(f"- {test}")
              sys.exit(1)

          print("All tests tagged should_fail failed as expected.")
          PY

      - name: Print enriched failure outputs
        if: always()
        working-directory: integration_tests
        run: |
          python - <<'PY'
          import glob
          import os
          import duckdb

          db_files = glob.glob("**/*.duckdb", recursive=True)

          if not db_files:
              print("No DuckDB database found.")
              raise SystemExit(0)

          db_path = max(db_files, key=os.path.getmtime)
          print(f"Using DuckDB database: {db_path}")

          con = duckdb.connect(db_path, read_only=True)

          tables = con.execute("""
              select table_schema, table_name
              from information_schema.tables
              where table_schema ilike '%dbt_test__audit%'
              order by table_name
          """).fetchall()

          if not tables:
              print("No stored failure tables found.")
              raise SystemExit(0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def to_markdown(headers, rows):
              lines = []
              lines.append("| " + " | ".join(headers) + " |")
              lines.append("| " + " | ".join(["---"] * len(headers)) + " |")

              for row in rows:
                  safe_values = [
                      "" if v is None else str(v).replace("|", "\\|").replace("\n", " ")
                      for v in row
                  ]
                  lines.append("| " + " | ".join(safe_values) + " |")

              return "\n".join(lines)

          output = ["# dbt-checks failure output", ""]

          for schema, table in tables:
              query = f'select * from "{schema}"."{table}" limit 20'
              result = con.execute(query)

              headers = [col[0] for col in result.description]
              rows = result.fetchall()

              if not rows:
                  continue

              output.append(f"## `{table}`")
              output.append("")
              output.append(to_markdown(headers, rows))
              output.append("")

          final_output = "\n".join(output)

          print(final_output)

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(final_output)
                  f.write("\n")
          PY

      - name: Check dbt compilation
        working-directory: integration_tests
        run: dbt compile

      - name: Check documentation generation
        working-directory: integration_tests
        run: dbt docs generate

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            integration_tests/target
            integration_tests/logs
            integration_tests_invalid_configs/target
            integration_tests_invalid_configs/invalid_config_output.log

      - name: Check GitHub community templates
        run: |
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          test -f .github/ISSUE_TEMPLATE/config.yml
          test -f .github/PULL_REQUEST_TEMPLATE.md

          python - <<'PY'
          import yaml
          from pathlib import Path

          files = [
              Path(".github/ISSUE_TEMPLATE/bug_report.yml"),
              Path(".github/ISSUE_TEMPLATE/feature_request.yml"),
              Path(".github/ISSUE_TEMPLATE/config.yml"),
          ]

          for file in files:
              with file.open(encoding="utf-8") as f:
                  yaml.safe_load(f)

          print("GitHub issue templates are valid YAML.")
          PY

          grep -i "Bug report" .github/ISSUE_TEMPLATE/bug_report.yml
          grep -i "Feature request" .github/ISSUE_TEMPLATE/feature_request.yml
          grep -i "Pull Request" .github/PULL_REQUEST_TEMPLATE.md