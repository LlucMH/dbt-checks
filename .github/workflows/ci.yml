name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-governance:
    name: repo-governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check OSS governance files
        run: |
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f SUPPORT.md

          grep -i "contributing" CONTRIBUTING.md
          grep -i "code of conduct" CODE_OF_CONDUCT.md
          grep -i "security" SECURITY.md
          grep -i "support" SUPPORT.md

      - name: Check README community links
        run: |
          grep -i "Community & Support" README.md
          grep -i "CONTRIBUTING.md" README.md
          grep -i "CODE_OF_CONDUCT.md" README.md
          grep -i "SECURITY.md" README.md
          grep -i "SUPPORT.md" README.md

      - name: Check no select star in test macros
        run: |
          ! grep -R -i "select \*" macros/tests

      - name: Check standardized failure output columns
        run: |
          grep -R "failed_check" macros/tests
          grep -R "failure_reason" macros/tests
          grep -R "applied_condition" macros/tests

      - name: Check validation guards usage
        run: |
          grep -R "validate_" macros/tests

      - name: Check internal helper macros exist
        run: |
          grep -R '{% macro as_numeric' macros
          grep -R '{% macro as_string' macros
          grep -R '{% macro as_date' macros
          grep -R '{% macro safe_ratio' macros
          grep -R '{% macro apply_where' macros
          grep -R '{% macro apply_and_where' macros
          grep -R '{% macro applied_condition' macros
          grep -R '{% macro safe_sql_string_literal' macros

      - name: Check documentation structure
        run: |
          test -f docs/README.md
          test -f docs/overview.md
          test -f docs/checks.md
          test -f docs/grouped-checks.md
          test -f docs/conditional-checks.md
          test -f docs/rule-composition.md
          test -f docs/architecture.md
          test -f docs/ci.md
          test -f docs/examples.md

      - name: Check README links to documentation
        run: |
          grep -i "Documentation" README.md
          grep -i "docs/README.md" README.md
          grep -i "docs/overview.md" README.md
          grep -i "docs/checks.md" README.md
          grep -i "docs/grouped-checks.md" README.md
          grep -i "docs/conditional-checks.md" README.md
          grep -i "docs/rule-composition.md" README.md
          grep -i "docs/architecture.md" README.md
          grep -i "docs/ci.md" README.md
          grep -i "docs/examples.md" README.md

      - name: Check documentation content coverage
        run: |
          grep -R -i "where" docs README.md
          grep -R -i "NULL" docs README.md
          grep -R -i "Severity" docs README.md
          grep -R -i "Standardized" docs README.md
          grep -R -i "failure outputs" docs README.md
          grep -R -i "Validation Guards" docs README.md
          grep -R -i "OSS" docs README.md

      - name: Check README installation version exists
        run: |
          grep -E "revision: v[0-9]+\.[0-9]+\.[0-9]+" README.md

      - name: Check version has matching CHANGELOG entry
        run: |
          version=$(grep -E '^version:' dbt_project.yml | sed -E 's/version:\s*"?([0-9]+\.[0-9]+\.[0-9]+)"?/\1/')
          echo "dbt_project.yml version: $version"

          if ! grep -qE "^## \[$version\]" CHANGELOG.md; then
            echo "No CHANGELOG.md entry found for version $version"
            exit 1
          fi

          echo "CHANGELOG.md entry found for version $version"

      - name: Validate grouped validation documentation
        run: |
          grep -i "group_by" docs/grouped-checks.md
          grep -i "Grouped Checks" docs/grouped-checks.md
          grep -i "Grouped Aggregation Checks" docs/grouped-checks.md
          grep -i "Grouped Ratio Checks" docs/grouped-checks.md
          grep -i "Grouped Freshness Checks" docs/grouped-checks.md
          grep -i "Multi-column Grouping" docs/grouped-checks.md
          grep -i "Grouped Failure Outputs" docs/grouped-checks.md
          grep -i "grouped_by_" docs/grouped-checks.md
          grep -i "recent_date" docs/grouped-checks.md

      - name: Validate grouped validation helpers
        run: |
          grep "normalize_group_by" macros/helpers/grouping.sql
          grep "render_group_by_select" macros/helpers/grouping.sql
          grep "render_group_by_clause" macros/helpers/grouping.sql
          grep "render_group_by_output" macros/helpers/grouping.sql
          grep "validate_group_by" macros/helpers/validation.sql
          grep "group_by_alias" macros/helpers/grouping.sql
          grep "build_aggregation_validation_cte" macros/helpers/aggregation.sql
          grep "render_aggregation_metric" macros/helpers/aggregation.sql

      - name: Validate multi-column checks
        run: |
          grep -i "Multi-column" docs/checks.md
          grep -R "column_greater_than_column" macros/tests/multi_column
          grep -R "column_less_than_column" macros/tests/multi_column
          grep -R "columns_equal" macros/tests/multi_column
          grep -R "columns_distinct" macros/tests/multi_column
          grep -R "left_column" macros/tests/multi_column
          grep -R "right_column" macros/tests/multi_column
          grep -R "validate_required_column" macros/helpers/validation.sql

          grep -i "Rule Composition" docs/rule-composition.md
          grep -R "expression_is_true" macros/tests/rule_composition
          grep -R "all_of" macros/tests/rule_composition
          grep -R "any_of" macros/tests/rule_composition
          grep -R "validate_expression_list" macros/helpers/validation.sql
          grep -R "failed_expression" macros/tests/rule_composition

      - name: Validate conditional checks
        run: |
          grep -i "Conditional Checks" docs/conditional-checks.md
          grep -R "require_when" macros/tests/conditional
          grep -R "require_not_null_when" macros/tests/conditional
          grep -R "require_value_when" macros/tests/conditional
          grep -R "trigger_condition" macros/tests/conditional
          grep -R "required_condition" macros/tests/conditional
          grep -R "required_column" macros/tests/conditional
          grep -R "required_value" macros/tests/conditional

      - name: Validate documentation assets
        run: |
          test -f docs/assets/grouped-checks-example.png
          test -f docs/assets/medallion-quality-strategy.png
          test -f docs/assets/ci-rollout-strategy.png
          test -f docs/assets/failure-output-example.png
          test -f docs/assets/stored-failures-example.png
          test -f docs/assets/validation-flow.png
          test -f docs/assets/dbt-docs-example.png
          test -f docs/assets/ci-failure-example.png

      - name: Check GitHub community templates
        run: |
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          test -f .github/ISSUE_TEMPLATE/config.yml
          test -f .github/PULL_REQUEST_TEMPLATE.md

          pip install --quiet pyyaml

          python - <<'PY'
          import yaml
          from pathlib import Path

          files = [
              Path(".github/ISSUE_TEMPLATE/bug_report.yml"),
              Path(".github/ISSUE_TEMPLATE/feature_request.yml"),
              Path(".github/ISSUE_TEMPLATE/config.yml"),
          ]

          for file in files:
              with file.open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)

          print("GitHub issue templates are valid YAML.")
          PY

          grep -i "Bug report" .github/ISSUE_TEMPLATE/bug_report.yml
          grep -i "Feature request" .github/ISSUE_TEMPLATE/feature_request.yml
          grep -i "Pull Request" .github/PULL_REQUEST_TEMPLATE.md

  integration-tests:
    name: integration-tests (${{ matrix.adapter }})

    strategy:
      fail-fast: false
      matrix:
        adapter:
          - duckdb
          - postgres

    uses: ./.github/workflows/adapter-integration-tests.yml

    with:
      adapter: ${{ matrix.adapter }}

    secrets: inherit

  check-bigquery-configuration:
    name: check-bigquery-configuration
    runs-on: ubuntu-latest

    outputs:
      enabled: ${{ steps.configuration.outputs.enabled }}

    steps:
      - name: Check BigQuery configuration
        id: configuration
        shell: bash
        env:
          BIGQUERY_PROJECT: ${{ vars.BIGQUERY_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [[ -n "$BIGQUERY_PROJECT" && -n "$GCP_SA_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "BigQuery integration tests are enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "BigQuery integration tests are skipped because credentials are not configured."
          fi

  bigquery-integration-tests:
    name: integration-tests (bigquery)

    needs:
      - check-bigquery-configuration

    if: needs.check-bigquery-configuration.outputs.enabled == 'true'

    uses: ./.github/workflows/adapter-integration-tests.yml

    with:
      adapter: bigquery

    secrets: inherit

  check-snowflake-configuration:
    name: check-snowflake-configuration
    runs-on: ubuntu-latest

    outputs:
      enabled: ${{ steps.configuration.outputs.enabled }}

    steps:
      - name: Check Snowflake configuration
        id: configuration
        shell: bash
        env:
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          if [[ -n "$SNOWFLAKE_ACCOUNT" && -n "$SNOWFLAKE_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Snowflake integration tests are enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Snowflake integration tests are skipped because credentials are not configured."
          fi

  snowflake-integration-tests:
    name: integration-tests (snowflake)

    needs:
      - check-snowflake-configuration

    if: needs.check-snowflake-configuration.outputs.enabled == 'true'

    uses: ./.github/workflows/adapter-integration-tests.yml

    with:
      adapter: snowflake

    secrets: inherit

  check-databricks-configuration:
    name: check-databricks-configuration
    runs-on: ubuntu-latest

    outputs:
      enabled: ${{ steps.configuration.outputs.enabled }}

    steps:
      - name: Check Databricks configuration
        id: configuration
        shell: bash
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [[ -n "$DATABRICKS_HOST" && -n "$DATABRICKS_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Databricks integration tests are enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Databricks integration tests are skipped because credentials are not configured."
          fi

  databricks-integration-tests:
    name: integration-tests (databricks)

    needs:
      - check-databricks-configuration

    if: needs.check-databricks-configuration.outputs.enabled == 'true'

    uses: ./.github/workflows/adapter-integration-tests.yml

    with:
      adapter: databricks

    secrets: inherit